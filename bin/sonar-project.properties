sonar.host.url=https://sonarcloud.io
sonar.organization=latz-1
sonar.projectKey=Latz_LinkDigest
sonar.projectName=LinkDigest
sonar.qualitygate.wait=true
sonar.javascript.detectBundles=false

# Languages (prevents C/C++ analysis warnings)
sonar.language=php

# Source directories
sonar.sources=linkdigest.php,dashboard.css,src,chrome-extension

# Encoding
sonar.sourceEncoding=UTF-8

# Coverage
sonar.php.coverage.reportPaths=bin/reports/coverage.xml

# Exclusions
sonar.exclusions=\
  **/node_modules/**,\
  **/build/**,\
  **/vendor/**,\
  **/*.min.js,\
  **/tagify.min.js,\
  **/tagify.css,\
  **/memory/**,\
  **/*.md,\
  **/tests/stubs/**,\
  **/tests/helpers.php,\
  **/tests/mu-plugins/**
