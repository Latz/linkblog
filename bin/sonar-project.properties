sonar.host.url=https://sonarcloud.io
sonar.organization=latz-1
sonar.javascript.detectBundles=false

sonar.projectKey=Latz_linkblog
# Token provided via SONAR_TOKEN environment variable

# Source directories
sonar.sources=linkblog.php,dashboard.css,src,chrome-extension

# Encoding
sonar.sourceEncoding=UTF-8

# Exclusions
sonar.exclusions=\
  **/node_modules/**,\
  **/build/**,\
  **/vendor/**,\
  **/*.min.js,\
  **/tagify.min.js,\
  **/tagify.css,\
  **/memory/**,\
  **/*.md,\
  **/tests/stubs/**,\
  **/tests/helpers.php,\
  **/tests/mu-plugins/**
