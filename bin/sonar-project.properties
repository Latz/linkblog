sonar.host.url=https://sonarcloud.io
sonar.organization=latz-1
sonar.projectKey=Latz_linkblog
sonar.projectName=LinkBlog
sonar.qualitygate.wait=true

# Disable JavaScript/TypeScript analyzer (causes WebSocket crash on resource-constrained systems)
sonar.javascript.detectBundles=false
sonar.skip.javascript=true

# Languages (PHP only)
sonar.language=php

# Source directories (PHP only)
sonar.sources=linkdigest.php,src

# Encoding
sonar.sourceEncoding=UTF-8

# Coverage
sonar.php.coverage.reportPaths=bin/reports/coverage.xml

# Exclusions (including all JS/TS to disable JavaScript analyzer)
sonar.exclusions=\
  **/node_modules/**,\
  **/build/**,\
  **/vendor/**,\
  **/*.min.js,\
  **/*.js,\
  **/*.ts,\
  **/*.tsx,\
  **/*.css,\
  **/tagify.min.js,\
  **/tagify.css,\
  **/memory/**,\
  **/*.md,\
  **/tests/stubs/**,\
  **/tests/helpers.php,\
  **/tests/mu-plugins/**,\
  **/chrome-extension/**,\
  **/dashboard.css
