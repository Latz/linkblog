sonar.host.url=https://sonarcloud.io
sonar.organization=latz-1
sonar.projectKey=Latz_linkblog
sonar.projectName=LinkDigest
sonar.qualitygate.wait=true

# JavaScript/TypeScript analyzer settings
sonar.javascript.detectBundles=false
sonar.javascript.node.maxspace=2048

# Source directories (PHP + Chrome extension)
sonar.sources=linkdigest.php,src,chrome-extension

# Encoding
sonar.sourceEncoding=UTF-8

# Coverage
sonar.php.coverage.reportPaths=bin/reports/coverage.xml
sonar.javascript.lcov.reportPaths=bin/reports/coverage-js/lcov.info

# Exclusions
sonar.exclusions=\
  **/node_modules/**,\
  **/build/**,\
  **/vendor/**,\
  **/*.min.js,\
  **/tagify.min.js,\
  **/tagify.css,\
  **/memory/**,\
  **/*.md,\
  **/tests/stubs/**,\
  **/tests/helpers.php,\
  **/tests/mu-plugins/**

# Ignore S100 naming convention rule for the whole project
sonar.issue.ignore.multicriteria=ignoreS100
sonar.issue.ignore.multicriteria.ignoreS100.ruleKey=*:S100
sonar.issue.ignore.multicriteria.ignoreS100.resourceKey=**/*
