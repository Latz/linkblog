<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LinkDigest</title>
    <link rel="stylesheet" href="tagify.css">
    <link rel="stylesheet" href="popup.css">
</head>
<body>
    <div class="container">
        <div id="message" class="message"></div>

        <div class="header">
            <h1>LinkDigest</h1>
        </div>

        <div id="setupMessage" class="setup-message" style="display: none;">
            <p>⚙️ Please configure your API settings first.</p>
            <button id="openSettings" class="btn btn-secondary">Open Settings</button>
        </div>

        <div id="mainForm" style="display: none;">
            <form id="linkForm">
                <div class="form-group">
                    <label for="title">Title *</label>
                    <input type="text" id="title" name="title" required placeholder="Link title">
                </div>

                <div class="form-group">
                    <label for="url">URL</label>
                    <input type="url" id="url" name="url" placeholder="https://example.com">
                </div>

                <div class="form-group">
                    <label for="content">Description</label>
                    <textarea id="content" name="content" rows="3" placeholder="Optional description"></textarea>
                </div>

                <div class="form-group">
                    <fieldset>
                        <legend class="form-label">Categories</legend>
                        <div id="categoriesList" class="categories-list">
                            <div class="loading">Loading categories...</div>
                        </div>
                    </fieldset>
                </div>

                <div class="form-group">
                    <label for="tags">Tags</label>
                    <input type="text" id="tags" name="tags" placeholder="Separate with commas">
                </div>

                <div class="form-actions">
                    <button type="submit" class="btn btn-primary" id="saveBtn">
                        <span class="btn-text">Save Link</span>
                        <span class="btn-loading" style="display: none;">Saving...</span>
                    </button>
                    <button type="button" class="btn btn-secondary" id="settingsBtn">Settings</button>
                </div>
            </form>
        </div>
    </div>

    <script src="tagify.min.js"></script>
    <script src="popup.js"></script>
</body>
</html>
